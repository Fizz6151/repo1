        * {

            scroll-behavior: smooth;

        body {

            display: flex;
            justify-content: space-between;
            align-items: center;

        }

        nav a {

            font-size: 16px;
            font-weight: 500;
            color: #bbb;
        }

        nav a:hover {
            color: #00ff88;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 65vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            background: radial-gradient(circle at 80% 20%, #161616 0%, #0b0b0b 70%);
            margin-top: 80px;
        }

        .hero h3 {
            font-size: 24px;
            color: #888;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .hero h1 {

            color: #aaa;

        }

        /* --- KAD DETAIL & MEDIA SOSIAL --- */
        .social-section {
            padding: 60px 8% 100px;
            background: #0b0b0b;
        }

        .section-title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            font-weight: 700;
        }

        .section-title::after {
            content: '';
            width: 50px;
            height: 3px;
            background: #00ff88;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .grid-contacts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 500px));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
            justify-content: center;
        }

        .card {
            background: #121212;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card svg {
            width: 55px;
            height: 55px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            color: #888;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .card-btn {
            display: inline-block;
            padding: 12px 24px;
            color: #fff;
            font-weight: 600;
            border-radius: 6px;
            width: 100%;
            transition: 0.3s;
        }

        /* Gaya Unik Mengikut Aplikasi (Kesan Cahaya Glow semasa Hover) */
        /* WHATSAPP */
        .whatsapp-card:hover {
            border-color: #25D366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.2);
        }

        .whatsapp-btn:hover { background: #1ebd59; }

        /* TELEGRAM */

            border-color: #0088cc;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.2);
        }
        .telegram-btn { background: #0088cc; }
        .telegram-btn:hover { background: #0077b3; }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid #1a1a1a;
            font-size: 14px;
            color: #555;
            background: #090909;
        }

        /* --- RESPONSIVE FOR MOBILE --- */
        @media (max-width: 768px) {
            header { padding: 20px 5%; }
            nav a { margin-left: 15px; font-size: 14px; }
            .hero { height: auto; padding: 60px 5%; }
            .hero h1 { font-size: 38px; }
            .hero h3 { font-size: 18px; }
            .social-section { padding: 60px 5%; }
        }
